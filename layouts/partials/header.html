<header class="cd-header" role="banner">
  <div class="cd-header-inner">
    <a href="{{ .Site.Home.RelPermalink }}" class="cd-site-title cd-glitch" data-text="{{ .Site.Title }}" aria-label="{{ .Site.Title }}">
      <span aria-hidden="true">{{ .Site.Title }}</span>
    </a>

    <button class="cd-hamburger" type="button" aria-label="{{ i18n "menu.toggle" | default "Toggle menu" }}" aria-expanded="false" aria-controls="cd-main-nav">
      <span class="cd-hamburger-box" aria-hidden="true">
        <span class="cd-hamburger-inner"></span>
      </span>
    </button>

    <div class="cd-nav-group">
      {{- if .Site.Params.showSearch -}}
      <button class="cd-search-trigger" type="button" aria-label="{{ i18n "search.trigger_label" | default "Toggle search" }}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <span class="cd-search-trigger-kbd" aria-hidden="true">Ctrl+K</span>
      </button>
      {{- end -}}

      {{- with .Site.Menus.main -}}
      <nav class="cd-nav" id="cd-main-nav" aria-label="{{ i18n "navigation.main" | default "Main navigation" }}" role="navigation" aria-hidden="false">
        <ul class="cd-nav-list" role="menubar" aria-label="{{ i18n "navigation.main" | default "Main navigation" }}">
          {{- partial "menu.html" (dict "menu" . "page" $ "root" true) -}}
        </ul>
      </nav>
      {{- end -}}
    </div>
  </div>
</header>
