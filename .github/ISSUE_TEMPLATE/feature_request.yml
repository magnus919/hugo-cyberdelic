name: Feature Request
description: Suggest a new feature or enhancement
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: "Thanks for the idea! Describe what you'd like to see in hugo-cyberdelic."
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What should the theme do that it doesn't today?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: How would this feature be used? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds you've tried or alternative approaches?
