# exampleSite — hugo-cyberdelic demo configuration
# Extends theme defaults — only values that differ from theme defaults are set here.

baseURL    = "https://hugo-cyberdelic.example.com"
languageCode = "en-US"
title      = "hugo-cyberdelic"
theme      = "hugo-cyberdelic"

# Suppress goldmark raw HTML warnings (theme has unsafe=true)
ignoreLogs = ['warning-goldmark-raw-html']

# Default taxonomies
[taxonomies]
  tag      = "tags"
  category = "categories"
  author   = "authors"
  series   = "series"

# Related content configuration (shared tags/categories)
[related]
  threshold    = 1
  includeNewer = true
  toLower      = true

  [[related.indices]]
    name   = "tags"
    weight = 100

  [[related.indices]]
    name   = "categories"
    weight = 50

# Search index output (JSON)
[outputFormats]
  [outputFormats.SEARCH]
    baseName = "search"
    isPlainText = false
    mediaType = "application/json"
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "SEARCH"]

# Nested menu structure — working links only
# NOTE: Defined here instead of a separate menus.en.toml to avoid
# config cascade conflicts with the theme's menus.en.toml.
[[menu.main]]
  name       = "Home"
  identifier = "home"
  url        = "/"
  weight     = 10

[[menu.main]]
  name       = "Blog"
  identifier = "blog"
  url        = "/blog/"
  weight     = 20

[[menu.main]]
  name       = "Tags"
  identifier = "tags"
  parent     = "blog"
  url        = "/tags/"
  weight     = 27

[[menu.main]]
  name       = "About"
  identifier = "about"
  url        = "/about/"
  weight     = 40
