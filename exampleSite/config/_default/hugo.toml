# exampleSite — hugo-cyberdelic demo configuration
# Extends theme defaults — only values that differ from theme defaults are set here.

baseURL    = "https://hugo-cyberdelic.example.com"
languageCode = "en-US"
title      = "hugo-cyberdelic"
theme      = "hugo-cyberdelic"

# Suppress goldmark raw HTML warnings (theme has unsafe=true)
ignoreLogs = ['warning-goldmark-raw-html']

# Default taxonomies (inherited from theme defaults)
[taxonomies]
  tag      = "tags"
  category = "categories"

# Related content configuration (shared tags/categories)
[related]
  threshold    = 1
  includeNewer = true
  toLower      = true

  [[related.indices]]
    name   = "tags"
    weight = 100

  [[related.indices]]
    name   = "categories"
    weight = 50

# Search index output (JSON)
[outputFormats]
  [outputFormats.SEARCH]
    baseName = "search"
    isPlainText = false
    mediaType = "application/json"
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "SEARCH"]
