# exampleSite — Theme Parameters Override
# Extends theme defaults — enable demo features here.

# Site metadata
description = "A cyberdelic Hugo theme demo — 1969 psychedelic concert poster meets cyberpunk holographic future."
author      = "Cyberdelic Demo"
ogImage     = ""

# === Homepage ===
homepageLayout = "hero"

# === Article / Post Features ===
showReadingTime   = true
showWordCount     = true
showSharing       = false
showRelated       = true
showPagination    = true
showComments      = false

# === Navigation & Discovery ===
showSearch          = true
showTableOfContents = true
showBreadcrumbs     = true
showHeadingAnchors  = false

# === Content Enhancements ===
showCodeCopy  = false
showImageZoom = true
showDraftLabel = false

# === Author ===
showAuthorBox = false

# === Series ===
showSeries = false

# === Analytics ===
[analytics]
  provider = ""

  [analytics.google]
    id = ""

  [analytics.fathom]
    siteID = ""

  [analytics.umami]
    websiteID = ""
    src       = ""

  [analytics.seline]
    token = ""
