# exampleSite — Theme Parameters Override
# Extends theme defaults — enable demo features here.

# Site metadata
description = "A cyberdelic Hugo theme demo — 1969 psychedelic concert poster meets cyberpunk holographic future."
author      = "Cyberdelic Demo"


# === Article / Post Features ===
showReadingTime   = true
readingSpeed      = 200
showWordCount     = true
showWordCountOnList = true
showSharing       = true
showRelated       = true
showPagination    = true

# === Navigation & Discovery ===
showSearch          = true
showTableOfContents = true
showBreadcrumbs     = true
showHeadingAnchors  = true

# === Content Enhancements ===
showCodeCopy  = true
showImageZoom = true
showDraftLabel = true

# === Author ===
showAuthorBox = true

# === Series ===
showSeries = true

# === Social Sharing ===
[sharing]
  enabled    = true
  bluesky    = true
  twitter    = true
  linkedin   = true
  mastodon   = true
  reddit     = true
  email      = true

# === Analytics ===
[analytics]
  provider = ""

  [analytics.google]
    id = ""

  [analytics.fathom]
    siteID = ""

  [analytics.umami]
    websiteID = ""
    src       = ""

  [analytics.seline]
    token = ""

# === Comments ===
[comments]
  enabled = false
  provider = ""

  # Uncomment one of the following provider blocks to activate:

  # Disqus example:
  # provider = "disqus"
  # [comments.disqus]
  #   shortname = "your-disqus-shortname"

  # utterances example:
  # provider = "utterances"
  # [comments.utterances]
  #   repo = "owner/repo-name"
  #   issueTerm = "pathname"

  # giscus example:
  # provider = "giscus"
  # [comments.giscus]
  #   repo = "owner/repo-name"
  #   repoId = "R_kgDOXXXXXX"
  #   category = "Announcements"
  #   categoryId = "DIC_kwDOXXXXXX"
  #   mapping = "pathname"
  #   theme = "dark"

  # Isso example:
  # provider = "isso"
  # [comments.isso]
  #   dataUrl = "https://comments.example.com"
  #   avatar = true
  #   css = true

# === Homepage ===
[homepage]
  layout = "hero"
