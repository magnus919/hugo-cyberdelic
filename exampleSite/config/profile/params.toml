# Profile homepage layout variant
# Usage: hugo server -D --environment profile

[homepage]
  layout = "profile"

  [homepage.profile]
    avatar = "/images/profile-avatar.png"
    name = "Cyberdelic Demo"
    headline = "A cyberdelic Hugo theme — 1969 psychedelic concert poster meets cyberpunk holographic future."
    bio = "Welcome to the hugo-cyberdelic demo site. Browse the sample posts below to see the theme in action."
