# hugo-cyberdelic — Default Site Configuration
# Sites using this theme can override any of these values in their own hugo.toml.

baseURL       = "https://example.com"
languageCode  = "en-US"
title         = "hugo-cyberdelic"
theme         = "hugo-cyberdelic"

# Default taxonomies
[taxonomies]
  tag      = "tags"
  category = "categories"
  author   = "authors"
  series   = "series"

# Related content configuration (shared tags/categories)
[related]
  threshold    = 1
  includeNewer = true
  toLower      = true

  [[related.indices]]
    name     = "tags"
    weight   = 100

  [[related.indices]]
    name     = "categories"
    weight   = 50

# Custom output formats
[outputFormats]
  [outputFormats.SEARCH]
    baseName = "search"
    isPlainText = false
    mediaType = "application/json"
    notAlternative = true

# Outputs by page kind
[outputs]
  home = ["HTML", "RSS", "SEARCH"]
