# hugo-cyberdelic — Theme Parameters
# ===
# All feature toggles default to false — no component renders unless explicitly
# enabled by the site owner. Sites can override any value in their own params.toml.

# Site metadata
description = "A cyberdelic Hugo theme — 1969 psychedelic concert poster meets cyberpunk holographic future."
author      = "Author"
ogImage     = ""

# === Article / Post Features ===
# Reading time display
showReadingTime = false

# Reading speed in words per minute (for reading time calculation).
# Default (0) uses Hugo's built-in calculation (~200-250 wpm).
# Set to a custom value like 100, 150, 300 for different pacing.
readingSpeed = 0

# Word count display
showWordCount = false

# Word count display on list cards (requires showWordCount = true)
showWordCountOnList = false

# Social sharing buttons (Bluesky, Twitter/X, LinkedIn, Mastodon, Reddit, email)
showSharing = false

# Related articles section at bottom of posts
showRelated = false

# Maximum number of related articles to show
relatedArticlesLimit = 4

# Next / Previous article pagination
showPagination = false

# === Navigation & Discovery ===
# Client-side search overlay (Fuse.js)
showSearch = false

# Scrollable table of contents with active heading tracking
showTableOfContents = false

# Breadcrumbs with Schema.org BreadcrumbList structured data
showBreadcrumbs = false

# Heading anchor links (on-hover permalink icon)
showHeadingAnchors = false

# === Content Enhancements ===
# Code block copy button
showCodeCopy = false

# Image click-to-zoom lightbox
showImageZoom = false

# Gallery shortcode image lightbox
showGalleryLightbox = false

# Draft label indicator
showDraftLabel = false

# === Author ===
# Author bio box on article pages
showAuthorBox = false

# === Series ===
# Series navigation component
showSeries = false

# === Homepage ===
[homepage]
  # Layout variant: "hero" (default), "profile", "background", "card"
  layout = "hero"

  [homepage.profile]
    # Author avatar image URL
    avatar = ""
    # Author display name (falls back to params.author)
    name = ""
    # Tagline / headline text
    headline = ""
    # Short biography text
    bio = ""

  [homepage.background]
    # Full-bleed background image URL
    image = ""
    # Custom heading text (falls back to site title)
    heading = ""
    # Subtitle text (falls back to site description)
    subtitle = ""

  # Show "View all posts" link when total posts exceed the card limit
  showMoreLink = true
  # Destination URL for the "View all posts" link (default: "/blog/")
  showMoreLinkDest = "/blog/"

  [homepage.card]
    # Custom heading text (falls back to i18n "Recent Posts")
    heading = ""
    # Maximum number of cards to display
    limit = 6

# === Cyberdelic Effects ===
[cyberdelic]
  # Visual effects — defaults match current always-on aesthetic
  glitch = true           # Glitch text animation on .cd-glitch elements
  scanlines = true        # CRT scan line overlay on body
  fadeIn = true           # Scroll-triggered fade-in on card grid
  particles = false       # Floating neon particle background (CSS, opt-in)
  circuitBorder = false   # Animated circuit-board border (CSS, opt-in)

  # Dynamic content — opt-in
  showRelatedPosts = false
  tableOfContents = false
  backToTop = false
  readingProgress = false
  ambientCanvas = false
  paginationStyle = "minimal"   # "minimal" | "numbered" | "infinite"

# === Social Sharing ===
[sharing]
  # Master toggle — when false, no sharing buttons render
  enabled = false

  # Platform-specific toggles
  bluesky  = true
  twitter  = true
  linkedin = true
  mastodon = true
  reddit   = true
  email    = true

  # Twitter/X: optional @handle for the `via` parameter
  twitterHandle = ""

  # Mastodon: custom instance (e.g., "mastodon.social")
  mastodonInstance = ""

# === Comments ===
[comments]
  # Master toggle — when false, no comments section renders
  enabled = false
  # Supported providers: "disqus", "utterances", "giscus", "isso"
  provider = ""

  [comments.disqus]
    # Your Disqus shortname (e.g., "myblog")
    shortname = ""

  [comments.utterances]
    # GitHub repository in format "owner/repo" (e.g., "owner/my-repo")
    repo = ""
    # Mapping: "pathname", "url", "title", "og:title"
    issueTerm = "pathname"
    # Optional label for utterances issues
    label = ""

  [comments.giscus]
    # GitHub repository in format "owner/repo"
    repo = ""
    # GitHub repository ID (required by giscus)
    repoId = ""
    # Discussion category
    category = ""
    # Discussion category ID (required by giscus)
    categoryId = ""
    # Mapping: "pathname", "url", "title", "og:title"
    mapping = "pathname"
    # Theme: "dark" (recommended for cyberdelic), "dark_dimmed", "light"
    theme = "dark"
    # Language for giscus (e.g., "en")
    language = ""
    # Enable reactions: "1" or "0"
    reactionsEnabled = "1"
    # Emit metadata: "1" or "0"
    emitMetadata = "0"
    # Input position: "top" or "bottom"
    inputPosition = "bottom"

  [comments.isso]
    # Isso server URL (e.g., "https://comments.example.com")
    dataUrl = ""
    # Show avatar: true or false
    avatar = true
    # Load Isso CSS: true or false
    css = true

# === External Articles ===
# Articles with externalUrl frontmatter open in new tab and show an indicator
[externalLink]
  # Open external articles in a new tab (target=_blank)
  newTab = true
  # Show a visual indicator (external link icon) on card listings
  showIndicator = true

# === Analytics ===
[analytics]
  # Supported providers: "google", "fathom", "umami", "seline"
  provider = ""

  [analytics.google]
    id = ""

  [analytics.fathom]
    siteID = ""

  [analytics.umami]
    websiteID = ""
    src       = ""

  [analytics.seline]
    token = ""
